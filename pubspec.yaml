name: anemia_app
description: "HemoScan - Clinical Anemia Screening"
publish_to: 'none'
version: 1.0.0+1
  
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  image_picker: ^1.0.7
  image: ^4.1.3
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8
  intl: ^0.18.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # ── Asset images ────────────────────────────────────────
  # Place your doctor-patient image at the path below.
  # Supported formats: jpg, png, webp
  assets:
    - assets/images/doctor_patient.png
 